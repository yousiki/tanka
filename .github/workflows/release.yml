name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag (e.g. v0.1.0) to check out and publish. Required for manual runs to produce a release."
        required: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # rust-toolchain.toml pins 1.93.0, which is what cargo actually uses
      # inside the repo. dtolnay installs the target against *stable*, not
      # against 1.93.0 — without this explicit add, the pinned toolchain
      # has no x86_64-apple-darwin and the matrix build fails.
      - name: Install target on pinned toolchain
        working-directory: src-tauri
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - run: bun install --frozen-lockfile

      - name: Build Tanka.app
        run: bun run tauri build --target ${{ matrix.target }}

      - name: Rename DMG artifact
        run: |
          set -euo pipefail
          cd src-tauri/target/${{ matrix.target }}/release/bundle/dmg
          shopt -s nullglob
          dmgs=(*.dmg)
          shopt -u nullglob
          if [ "${#dmgs[@]}" -ne 1 ]; then
            echo "expected exactly one .dmg, found ${#dmgs[@]}: ${dmgs[*]}" >&2
            exit 1
          fi
          mv -- "${dmgs[0]}" "Tanka-${{ matrix.arch }}.dmg"
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: Tanka-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/Tanka-${{ matrix.arch }}.dmg

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || inputs.tag != ''
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: Tanka-*
          merge-multiple: true

      - run: ls -la dist

      - name: Generate SHA256 checksums
        run: cd dist && shasum -a 256 *.dmg > SHA256SUMS

      - name: Generate release-ready Homebrew cask
        run: python3 .github/scripts/render_cask.py
        env:
          GITHUB_REF_NAME: ${{ inputs.tag || github.ref_name }}

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            dist/Tanka-aarch64.dmg
            dist/Tanka-x86_64.dmg
            dist/SHA256SUMS
            dist/tanka.rb
          generate_release_notes: true

      # Publishes the rendered cask to yousiki/homebrew-tanka so
      # `brew install --cask yousiki/tanka/tanka` picks up the new
      # version. Requires a secret HOMEBREW_TAP_TOKEN (a fine-grained
      # PAT with Contents: read+write on homebrew-tanka only). If the
      # secret is absent the step is skipped, so the release itself
      # still succeeds.
      - name: Update Homebrew tap (yousiki/homebrew-tanka)
        if: ${{ env.TAP_TOKEN != '' }}
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG_NAME: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          git clone --depth=1 \
            "https://x-access-token:${TAP_TOKEN}@github.com/yousiki/homebrew-tanka.git" \
            "$workdir"
          mkdir -p "$workdir/Casks"
          cp dist/tanka.rb "$workdir/Casks/tanka.rb"
          cd "$workdir"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Casks/tanka.rb
          if git diff --cached --quiet; then
            echo "Cask already at the published version; nothing to push."
            exit 0
          fi
          git commit -m "tanka ${TAG_NAME}"
          git push origin HEAD:main
