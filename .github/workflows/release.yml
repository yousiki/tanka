name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Leave empty to use HEAD."
        required: false
        default: ""

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - run: bun install --frozen-lockfile

      - name: Build Tanka.app
        run: bun run tauri build --target ${{ matrix.target }}

      - name: Rename DMG artifact
        run: |
          set -euo pipefail
          cd src-tauri/target/${{ matrix.target }}/release/bundle/dmg
          for f in *.dmg; do
            mv "$f" "Tanka-${{ matrix.arch }}.dmg"
          done
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: Tanka-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/Tanka-${{ matrix.arch }}.dmg

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: Tanka-*
          merge-multiple: true

      - run: ls -la dist

      - name: Generate SHA256 checksums
        run: cd dist && shasum -a 256 *.dmg > SHA256SUMS

      - name: Generate release-ready Homebrew cask
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          arm_sha=$(awk '/Tanka-aarch64.dmg$/ {print $1}' dist/SHA256SUMS)
          intel_sha=$(awk '/Tanka-x86_64.dmg$/ {print $1}' dist/SHA256SUMS)
          if [[ -z "$arm_sha" || -z "$intel_sha" ]]; then
            echo "Could not extract both arch hashes from SHA256SUMS" >&2
            cat dist/SHA256SUMS >&2
            exit 1
          fi
          sed \
            -e "s|version \"[^\"]*\"|version \"${version}\"|" \
            -e "0,/sha256 \"[^\"]*\"/ s||sha256 \"${arm_sha}\"|" \
            -e "s|sha256 \"0\{64\}\"|sha256 \"${intel_sha}\"|" \
            homebrew/tanka.rb > dist/tanka.rb
          echo "---"
          cat dist/tanka.rb

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Tanka-aarch64.dmg
            dist/Tanka-x86_64.dmg
            dist/SHA256SUMS
            dist/tanka.rb
          generate_release_notes: true
